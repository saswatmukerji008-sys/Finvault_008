<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinVault Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #0f172a;
      text-align: center;
    }

    p {
      text-align: center;
      color: #64748b;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      margin-top: 14px;
      font-weight: bold;
      color: #0f172a;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .small-text {
      margin-top: 16px;
      font-size: 14px;
    }

    .small-text a {
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Login</h1>
    <p>Welcome back to FinVault</p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" />

    <button onclick="loginUser()">Login</button>

    <p class="small-text">
      Don’t have an account?
      <a href="#">Sign up</a>
    </p>
  </div>

  <script>
    function loginUser() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (email === '' || password === '') {
        alert('Please enter email and password');
      } else {
        window.location.href = "dashboard.html";
      }
    }
  </script>
</body>
</html>
